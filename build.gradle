plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.0'
    id 'io.spring.dependency-management' version '1.1.6'
    id 'jacoco'
    id 'checkstyle'
    id 'com.github.spotbugs' version '6.0.25'
    id 'org.owasp.dependencycheck' version '9.2.0'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'

def javaVersion = JavaVersion.VERSION_21

java {
    sourceCompatibility = javaVersion
    targetCompatibility = javaVersion
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

tasks.named('test') {
    useJUnitPlatform()
}

checkstyle {
    toolVersion = '10.12.3'
    configFile = file('config/checkstyle/checkstyle.xml')
}

tasks.withType(Checkstyle).configureEach {
    reports {
        xml.required = true
        html.required = true
    }
}

spotbugs {
    toolVersion = '4.8.3'
    effort = 'max'
    reportLevel = 'low'
    excludeFilter = file('config/spotbugs/exclude.xml')
}

tasks.withType(com.github.spotbugs.snom.SpotBugsTask).configureEach {
    reports {
        xml.required = true
        html.required = true
    }
}

jacoco {
    toolVersion = '0.8.11'
}

tasks.jacocoTestReport {
    dependsOn tasks.test
    reports {
        xml.required = true
        html.required = true
    }
}

tasks.jacocoTestCoverageVerification {
    dependsOn tasks.jacocoTestReport
    violationRules {
        rule {
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.80
            }
        }
    }
}

def nvdApiKey = System.getenv('NVD_API_KEY')
def hasNvdApiKey = nvdApiKey != null && !nvdApiKey.isBlank()

dependencyCheck {
    skip = !hasNvdApiKey
    failBuildOnCVSS = 7.0
    failOnError = hasNvdApiKey
    data {
        directory = file("$buildDir/dependency-check-data")
    }
    nvd {
        apiKey = nvdApiKey
    }
    suppressionFile = 'config/dependency-check/suppressions.xml'
    formats = ['HTML', 'XML']
}

tasks.named('check') {
    dependsOn tasks.jacocoTestCoverageVerification
    dependsOn tasks.checkstyleMain, tasks.checkstyleTest
    dependsOn tasks.spotbugsMain, tasks.spotbugsTest
}
